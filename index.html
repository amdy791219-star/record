<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網頁書籤</title>
  <style>
    :root {
      --primary: #4a90e2;
      --primary-dark: #357ae8;
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #333333;
      --text-soft: #888888;
      --line: #e5e7eb;
      --coral: #e74c3c;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ---------- Auth ---------- */
    #authScreen {
      background: var(--card);
      padding: 36px 32px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      margin-top: 80px;
      width: 100%;
      max-width: 360px;
    }
    #authScreen h2 { margin: 0 0 6px; color: #2c3e50; font-size: 20px; }
    #authScreen p { margin: 0 0 20px; color: var(--text-soft); font-size: 13px; }
    #authScreen input {
      width: 100%; padding: 10px 12px; margin-bottom: 10px;
      border: 1px solid var(--line); border-radius: 6px;
      font-size: 15px; color: var(--text);
    }
    #authScreen input:focus { outline: none; border-color: var(--primary); }
    #authError {
      background: #fdf2f2; color: var(--coral);
      font-size: 13px; padding: 8px 12px;
      border-radius: 6px; margin-bottom: 10px;
      display: none;
    }
    .auth-switch { margin-top: 14px; font-size: 13px; color: var(--text-soft); }
    .auth-switch button {
      background: none; border: none; color: var(--primary);
      font-weight: 600; cursor: pointer; padding: 0;
      font-size: 13px; height: auto;
    }

    /* ---------- App ---------- */
    #app { display: none; width: 100%; max-width: 860px; }
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap; gap: 10px;
    }
    .top-bar h1 { margin: 0; color: #2c3e50; font-size: 22px; }
    .top-bar-right { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-soft); }

    /* ---------- Form ---------- */
    .form-box {
      background: var(--card);
      padding: 18px 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-weight: 600; font-size: 13px; color: var(--text-soft); }
    .form-group input, .form-group select {
      padding: 9px 12px; border: 1px solid var(--line);
      border-radius: 6px; font-size: 14px; color: var(--text);
      background-color: #fff;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
    .form-group.date-group { flex: none; }
    .form-group.category-group { flex: none; min-width: 110px; }
    .form-group.url-group { flex: 2; min-width: 220px; }
    .form-group.title-group { flex: 1; min-width: 160px; }

    /* ---------- Tabs ---------- */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      border-bottom: 2px solid var(--line);
      padding-bottom: 8px;
      width: 100%;
    }
    .tab-btn {
      background: none; border: none; padding: 8px 16px; cursor: pointer;
      font-size: 15px; font-weight: 600; color: var(--text-soft);
      position: relative; transition: color 0.2s;
    }
    .tab-btn.active { color: var(--primary); }
    .tab-btn.active::after {
      content: ''; position: absolute; bottom: -10px; left: 0; right: 0;
      height: 3px; background: var(--primary); border-radius: 2px;
    }

    /* ---------- Search ---------- */
    .search-box {
      display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; width: 100%;
    }
    .search-box input {
      flex: 1; min-width: 200px; padding: 9px 12px;
      border: 1px solid var(--line); border-radius: 6px; font-size: 14px;
    }
    .search-box input:focus { outline: none; border-color: var(--primary); }
    .count-label { font-size: 13px; color: var(--text-soft); white-space: nowrap; }

    /* ---------- Cards ---------- */
    .list-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
      width: 100%;
    }
    .card {
      background: var(--card);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.1); }
    
    .thumbnail-box {
      width: 100%; height: 148px;
      background: #eef2f5;
      position: relative; overflow: hidden; flex: none;
    }
    .thumbnail-box img.preview-img {
      width: 100%; height: 100%; object-fit: cover; display: none;
    }
    
    /* 載入中的骨架屏動畫 */
    .thumb-loading {
      position: absolute; top:0; left:0; width:100%; height:100%;
      background: linear-gradient(90deg, #f0f2f5 25%, #e6e8eb 50%, #f0f2f5 75%);
      background-size: 200% 100%;
      animation: loading-shimmer 1.5s infinite;
    }
    @keyframes loading-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .thumb-fallback-card {
      position: absolute; top:0; left:0; width:100%; height:100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 16px; text-align: center; 
      background: linear-gradient(135deg, #74abe2, #557394);
      color: #fff;
    }
    .thumb-fallback-card .fallback-fav {
      width: 36px; height: 36px; border-radius: 8px; background: #fff; padding: 4px; margin-bottom: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .thumb-fallback-card .fallback-text {
      font-size: 13px; font-weight: 600; max-width: 100%;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.95;
    }

    .card-content { padding: 14px; display: flex; flex-direction: column; flex: 1; }
    .card-meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .card-date { font-size: 11px; color: var(--text-soft); font-variant-numeric: tabular-nums; }
    .card-badge {
      font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 600;
      background: #e1f5fe; color: #0288d1;
    }
    .card-badge.favorite { background: #fff3e0; color: #f57c00; }
    
    .card-title {
      font-weight: 600; font-size: 14px; line-height: 1.4;
      margin-bottom: 6px; color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; flex: 1;
    }
    .card-url {
      font-size: 12px; color: var(--text-soft); margin-bottom: 12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-actions { display: flex; justify-content: space-between; align-items: center; }
    .btn-visit {
      color: var(--primary); text-decoration: none; font-weight: 600;
      font-size: 13px; display: flex; align-items: center; gap: 4px;
    }
    .btn-visit:hover { color: var(--primary-dark); }
    .btn-delete {
      background: none; border: none; color: #ddd; cursor: pointer;
      font-size: 13px; padding: 0; height: auto; transition: color 0.15s;
    }
    .btn-delete:hover { color: var(--coral); background: none; }

    /* ---------- Buttons ---------- */
    button.primary {
      background: var(--primary); color: #fff; border: none;
      padding: 9px 18px; border-radius: 6px; cursor: pointer;
      font-size: 14px; font-weight: 600; height: auto;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button.primary:hover { background: var(--primary-dark); }
    button.outline {
      background: transparent; color: var(--primary);
      border: 1px solid var(--primary); padding: 8px 14px;
      border-radius: 6px; cursor: pointer; font-size: 13px;
      font-weight: 600; height: auto;
    }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #333; color: #fff; padding: 10px 18px;
      border-radius: 8px; font-size: 13px; z-index: 80;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .empty-hint {
      grid-column: 1 / -1; text-align: center;
      color: var(--text-soft); padding: 48px 0;
    }
    .loading { color: var(--text-soft); font-size: 14px; padding: 40px 0; text-align: center; grid-column: 1/-1; }

    @media (max-width: 768px) {
      .form-box { flex-direction: column; align-items: stretch; }
      .form-group.url-group, .form-group.title-group, .form-group.category-group, .form-group.date-group { min-width: 0; width: 100%; }
    }
  </style>
</head>
<body>

<div id="authScreen">
  <h2>📑 網頁書籤</h2>
  <p>登入後即可管理你的書籤收藏</p>
  <div id="authError"></div>
  <div id="nameFieldWrap" style="display:none;">
    <input type="text" id="inputName" placeholder="你的稱呼(選填)">
  </div>
  <input type="email" id="inputEmail" placeholder="Email">
  <input type="password" id="inputPassword" placeholder="密碼(至少 6 個字元)">
  <button class="primary" onclick="handleAuth()" style="width:100%;margin-top:4px;">登入</button>
  <div class="auth-switch">
    <span id="authSwitchText">還沒有帳號?</span>
    <button onclick="toggleAuthMode()">建立帳號</button>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <h1>📑 書籤紀錄本</h1>
    <div class="top-bar-right">
      <span id="userLabel"></span>
      <button class="outline" onclick="handleLogout()">登出</button>
    </div>
  </div>

  <div class="form-box">
    <div class="form-group date-group">
      <label>日期</label>
      <input type="date" id="inputDate">
    </div>
    <div class="form-group category-group">
      <label>分類</label>
      <select id="inputCategory">
        <option value="normal">一般日常</option>
        <option value="favorite">⭐ 我的最愛</option>
      </select>
    </div>
    <div class="form-group url-group">
      <label>網址 (URL)</label>
      <input type="url" id="inputUrl" placeholder="https://example.com" oninput="autoFillLastSegment()" onkeypress="if(event.key==='Enter')addRecord()">
    </div>
    <div class="form-group title-group">
      <label>標題 (選填)</label>
      <input type="text" id="inputTitle" placeholder="自訂標題" onkeypress="if(event.key==='Enter')addRecord()">
    </div>
    <button class="primary" onclick="addRecord()">新增</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-normal" onclick="switchTab('normal')">一般日常</button>
    <button class="tab-btn" id="tab-favorite" onclick="switchTab('favorite')">⭐ 我的最愛</button>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜尋書籤標題或網址..." oninput="renderCards()">
    <span class="count-label" id="countLabel"></span>
  </div>

  <div class="list-container" id="listContainer">
    <div class="loading">載入中...</div>
  </div>
</div>

<div id="toastHost"></div>

<script type="module">
/* ============================================================
   Firebase — 與毛孩病歷本同一個專案
   ============================================================ */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged, updateProfile
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import {
  getFirestore, collection, doc, addDoc, deleteDoc,
  query, where, orderBy, onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBPpQXbAZOKncUSxpnvjAWxXSHXnABjHI",
  authDomain: "pet-record-94a50.firebaseapp.com",
  projectId: "pet-record-94a50",
  storageBucket: "pet-record-94a50.firebasestorage.app",
  messagingSenderId: "722991147631",
  appId: "1:722991147631:web:d3527b173510fa3d7bfb9a",
  measurementId: "G-3KQRD3WQBG"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ============================================================
   狀態
   ============================================================ */
let currentUser = null;
let records = [];       
let unsubRecords = null;
let authMode = 'login'; 
let currentTab = 'normal'; 

/* ============================================================
   工具
   ============================================================ */
function toast(msg) {
  const host = document.getElementById('toastHost');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  host.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function fmtDate(str) {
  if (!str) return '';
  const parts = str.split('-');
  if (parts.length !== 3) return str;
  return `${parts[0].slice(-2)}/${parts[1]}/${parts[2]}`;
}

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); }
  catch { return url; }
}

function getFaviconUrl(url) {
  try { const d = new URL(url).origin; return `https://www.google.com/s2/favicons?sz=64&domain=${d}`; }
  catch { return ''; }
}

/* ============================================================
   分類切換功能
   ============================================================ */
window.switchTab = function(tab) {
  currentTab = tab;
  document.getElementById('tab-normal').classList.toggle('active', tab === 'normal');
  document.getElementById('tab-favorite').classList.toggle('active', tab === 'favorite');
  renderCards();
};

/* ============================================================
   自動選取最後一節網址作為標題
   ============================================================ */
window.autoFillLastSegment = function() {
  const urlInput = document.getElementById('inputUrl');
  const titleInput = document.getElementById('inputTitle');
  
  if (urlInput.value.trim() !== "") {
    try {
      let urlStr = urlInput.value.trim();
      if (!/^https?:\/\//i.test(urlStr)) urlStr = 'https://' + urlStr;
      
      const urlObj = new URL(urlStr);
      const segments = urlObj.pathname.split('/').filter(Boolean);
      
      if (segments.length > 0) {
        titleInput.value = segments[segments.length - 1];
      } else {
        titleInput.value = urlObj.hostname.replace('www.', '');
      }
    } catch (e) { }
  }
};

/* ============================================================
   AUTH
   ============================================================ */
window.toggleAuthMode = function() {
  authMode = authMode === 'login' ? 'signup' : 'login';
  const isSignup = authMode === 'signup';
  document.getElementById('authSwitchText').textContent = isSignup ? '已經有帳號了?' : '還沒有帳號?';
  document.querySelector('.auth-switch button').textContent = isSignup ? '登入' : '建立帳號';
  document.querySelector('#authScreen .primary').textContent = isSignup ? '建立帳號' : '登入';
  document.getElementById('nameFieldWrap').style.display = isSignup ? 'block' : 'none';
  document.getElementById('authError').style.display = 'none';
};

window.handleAuth = async function() {
  const email = document.getElementById('inputEmail').value.trim();
  const password = document.getElementById('inputPassword').value;
  const name = document.getElementById('inputName')?.value.trim() || '';
  const errEl = document.getElementById('authError');
  errEl.style.display = 'none';
  try {
    if (authMode === 'signup') {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      if (name) await updateProfile(cred.user, { displayName: name });
    } else {
      await signInWithEmailAndPassword(auth, email, password);
    }
  } catch (e) {
    const map = {
      'auth/email-already-in-use': '這個 Email 已被使用',
      'auth/invalid-email': 'Email 格式不正確',
      'auth/weak-password': '密碼至少需要 6 個字元',
      'auth/invalid-credential': '帳號或密碼不正確',
    };
    errEl.textContent = map[e.code] || ('發生錯誤:' + e.code);
    errEl.style.display = 'block';
  }
};

window.handleLogout = function() { signOut(auth); };

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('userLabel').textContent = user.displayName || user.email;
    document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
    subscribeRecords();
  } else {
    document.getElementById('authScreen').style.display = 'block';
    document.getElementById('app').style.display = 'none';
    if (unsubRecords) unsubRecords();
    records = [];
  }
});

/* ============================================================
   Firestore: 書籤
   ============================================================ */
function subscribeRecords() {
  if (unsubRecords) unsubRecords();
  const q = query(
    collection(db, 'bookmarks'),
    where('ownerId', '==', currentUser.uid)
  );
  unsubRecords = onSnapshot(q, snap => {
    records = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    records.sort((a, b) => {
      const da = a.date || '';
      const db_ = b.date || '';
      if (da !== db_) return da > db_ ? -1 : 1;
      const ta = a.createdAt?.seconds || 0;
      const tb = b.createdAt?.seconds || 0;
      return tb - ta;
    });
    renderCards();
  }, err => {
    console.error(err);
    toast('讀取書籤失敗:' + err.message);
  });
}

window.addRecord = async function() {
  const date = document.getElementById('inputDate').value;
  const category = document.getElementById('inputCategory').value;
  const url = document.getElementById('inputUrl').value.trim();
  const title = document.getElementById('inputTitle').value.trim();

  if (!url) { toast('請輸入網址'); return; }
  let finalUrl = url;
  if (!/^https?:\/\//i.test(url)) finalUrl = 'https://' + url;

  const duplicate = records.find(r => r.url.toLowerCase() === finalUrl.toLowerCase());
  if (duplicate) {
    const catName = (duplicate.category === 'favorite') ? '⭐ 我的最愛' : '一般日常';
    const confirmAdd = confirm(`⚠️ 注意：此網址已經存在於【${catName}】分類中！\n標題為：${duplicate.title}\n\n確定還要重複新增嗎？`);
    if (!confirmAdd) return;
  }

  try {
    await addDoc(collection(db, 'bookmarks'), {
      ownerId: currentUser.uid,
      date,
      category, 
      url: finalUrl,
      title: title || getDomain(finalUrl),
      createdAt: serverTimestamp()
    });
    document.getElementById('inputUrl').value = '';
    document.getElementById('inputTitle').value = '';
    toast('書籤已新增');
  } catch (e) {
    toast('新增失敗:' + e.message);
  }
};

window.deleteRecord = async function(id) {
  if (!confirm('確定要刪除這個書籤嗎?')) return;
  try {
    await deleteDoc(doc(db, 'bookmarks', id));
    toast('已刪除');
  } catch (e) {
    toast('刪除失敗:' + e.message);
  }
};

/* ============================================================
   渲染書籤卡片 (包含優化後的智慧型預覽載入與 Timeout 攔截)
   ============================================================ */
window.renderCards = function() {
  const container = document.getElementById('listContainer');
  const kw = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';

  const categoryFiltered = records.filter(item => {
    const itemCat = item.category || 'normal'; 
    return itemCat === currentTab;
  });

  const filtered = kw
    ? categoryFiltered.filter(r => (r.title || '').toLowerCase().includes(kw) || (r.url || '').toLowerCase().includes(kw))
    : categoryFiltered;

  document.getElementById('countLabel').textContent =
    kw ? `找到 ${filtered.length} / ${categoryFiltered.length} 筆` : `共 ${categoryFiltered.length} 筆書籤`;

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-hint">${kw ? '找不到符合的書籤' : '此分類下目前沒有任何書籤！'}</div>`;
    return;
  }

  container.innerHTML = '';
  filtered.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';

    const isFav = item.category === 'favorite';
    const badgeText = isFav ? '⭐ 我的最愛' : '日常';
    const badgeClass = isFav ? 'card-badge favorite' : 'card-badge';
    
    const faviconSrc = getFaviconUrl(item.url);
    const previewImgSrc = `https://mini.s-shot.ru/1024x768/JPEG/400/Z100/?${encodeURIComponent(item.url)}`;

    card.innerHTML = `
      <div class="thumbnail-box" id="thumb-box-${item.id}">
        <div class="thumb-loading" id="loading-${item.id}"></div>
        
        <img class="preview-img" id="thumb-${item.id}" alt="網頁預覽">
        
        <div class="thumb-fallback-card" id="fb-${item.id}" style="display:none;">
          <img class="fallback-fav" src="${faviconSrc}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><text y=%2220%22 font-size=%2220%22>🔗</text></svg>'">
          <div class="fallback-text">${escHtml(item.title || getDomain(item.url))}</div>
        </div>
      </div>
      <div class="card-content">
        <div class="card-meta-row">
          <div class="card-date">${fmtDate(item.date)}</div>
          <div class="${badgeClass}">${badgeText}</div>
        </div>
        <div class="card-title">${escHtml(item.title || item.url)}</div>
        <div class="card-url">${escHtml(getDomain(item.url))}</div>
        <div class="card-actions">
          <a href="${item.url}" target="_blank" rel="noopener" class="btn-visit">前往網站 →</a>
          <button class="btn-delete" onclick="deleteRecord('${item.id}')">刪除</button>
        </div>
      </div>
    `;
    container.appendChild(card);

    // 【核心邏輯優化】透過 JS 動態監聽載入，並加入 4 秒強行 Timeout 機制
    const imgEl = card.querySelector(`#thumb-${item.id}`);
    const fbEl = card.querySelector(`#fb-${item.id}`);
    const loadingEl = card.querySelector(`#loading-${item.id}`);
    
    let isSettled = false;

    // 觸發 Fallback 顯示的內建函式
    const switchToFallback = () => {
      if (isSettled) return;
      isSettled = true;
      if (loadingEl) loadingEl.style.display = 'none';
      if (imgEl) imgEl.style.display = 'none';
      if (fbEl) fbEl.style.display = 'flex';
    };

    // 設定 4 秒超時：若第三方 API 4 秒內沒回傳，主動切換至備用 Favicon 畫面
    const timeoutId = setTimeout(() => {
      switchToFallback();
    }, 4000);

    imgEl.onload = () => {
      clearTimeout(timeoutId);
      if (isSettled) return;
      isSettled = true;
      
      if (loadingEl) loadingEl.style.display = 'none';
      imgEl.style.display = 'block';
    };

    imgEl.onerror = () => {
      clearTimeout(timeoutId);
      switchToFallback();
    };

    // 開始載入圖片
    imgEl.src = previewImgSrc;
  });
};

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
</script>
</body>
</html>
