<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網頁書籤紀錄本</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --background-color: #f5f7fa;
            --card-color: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: none; /* 預設隱藏主畫面 */
        }

        /* 密碼驗證區塊 */
        #authBox {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            margin-top: 100px;
            width: 100%;
            max-width: 350px;
        }

        #authBox h2 { margin-top: 0; color: #2c3e50; }
        #authBox input {
            width: 80%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 16px;
        }

        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }

        /* 輸入表單樣式 */
        .form-box {
            background: var(--card-color);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label { font-weight: bold; font-size: 14px; }
        .form-group input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            height: 40px;
            transition: background 0.2s;
        }

        button:hover { background-color: #357ae8; }

        /* 紀錄清單樣式 */
        .list-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .thumbnail-box { width: 100%; height: 150px; background-color: #eaeaea; position: relative; overflow: hidden; }
        .thumbnail-box img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        .card-date { font-size: 12px; color: #888; margin-bottom: 5px; }
        .card-title {
            font-weight: bold; font-size: 15px; margin-bottom: 15px; word-break: break-all;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex-grow: 1;
        }

        .card-actions { display: flex; justify-content: space-between; align-items: center; }
        .btn-visit { color: var(--primary-color); text-decoration: none; font-weight: bold; font-size: 14px; }
        .btn-delete { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 13px; padding: 0; height: auto; }
        .btn-delete:hover { color: #c0392b; }
    </style>
</head>
<body>

<div id="authBox">
    <h2>請輸入密碼</h2>
    <input type="password" id="passwordInput" placeholder="請輸入看書籤的密碼" onkeypress="handleKeyPress(event)">
    <button onclick="verifyPassword()" style="width: 80%; height: auto; padding: 10px;">解鎖網頁</button>
</div>

<div class="container" id="mainContainer">
    <h1>網頁書籤紀錄本</h1>

    <div class="form-box">
        <div class="form-group">
            <label for="inputDate">日期</label>
            <input type="date" id="inputDate">
        </div>
        <div class="form-group" style="flex: 2;">
            <label for="inputUrl">網址 (URL)</label>
            <input type="url" id="inputUrl" placeholder="https://example.com" required>
        </div>
        <button onclick="addRecord()">新增紀錄</button>
    </div>

    <div class="list-container" id="listContainer"></div>
</div>

<script>
    // 自訂你的網頁密碼 (這裡修改成你想設的密碼)
    const CORRECT_PASSWORD = '1234';

    function handleKeyPress(e) {
        if (e.key === 'Enter') verifyPassword();
    }

    // 驗證密碼
    function verifyPassword() {
        const input = document.getElementById('passwordInput').value;
        if (input === CORRECT_PASSWORD) {
            // 密碼正確，隱藏登入框，顯示主內容
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            
            // 初始化功能
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('inputDate').value = today;
            displayRecords();
        } else {
            alert('密碼錯誤！');
            document.getElementById('passwordInput').value = '';
        }
    }

    function getRecords() {
        const records = localStorage.getItem('web_records');
        return records ? JSON.parse(records) : [];
    }

    function addRecord() {
        const dateInput = document.getElementById('inputDate').value;
        const urlInput = document.getElementById('inputUrl').value.trim();

        if (!urlInput) { alert('請輸入網址！'); return; }

        let formattedUrl = urlInput;
        if (!/^https?:\/\//i.test(urlInput)) { formattedUrl = 'https://' + urlInput; }

        const records = getRecords();
        const newRecord = { id: Date.now(), date: dateInput, url: formattedUrl };

        records.unshift(newRecord);
        localStorage.setItem('web_records', JSON.stringify(records));
        document.getElementById('inputUrl').value = '';
        displayRecords();
    }

    function deleteRecord(id) {
        if(confirm('確定要刪除這條紀錄嗎？')) {
            let records = getRecords();
            records = records.filter(item => item.id !== id);
            localStorage.setItem('web_records', JSON.stringify(records));
            displayRecords();
        }
    }

    function displayRecords() {
        const records = getRecords();
        const container = document.getElementById('listContainer');
        container.innerHTML = '';

        if (records.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#888; grid-column: 1/-1;">目前還沒有任何紀錄喔！</p>';
            return;
        }

        records.forEach(item => {
            const thumbUrl = `https://s.wordpress.com/mshots/v1/${encodeURIComponent(item.url)}?w=400`;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="thumbnail-box">
                    <img src="${thumbUrl}" alt="網頁縮圖" onerror="this.src='https://placehold.co/400x250?text=No+Image'">
                </div>
                <div class="card-content">
                    <div class="card-date">${item.date}</div>
                    <div class="card-title">${item.url}</div>
                    <div class="card-actions">
                        <a href="${item.url}" target="_blank" class="btn-visit">前往網站 →</a>
                        <button class="btn-delete" onclick="deleteRecord(${item.id})">刪除</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }
</script>

</body>
</html>
